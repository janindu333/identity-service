apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: saloon-system
  labels:
    app: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: identity-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"
            - name: REDIS_HOST
              value: "redis-service"
            - name: DB_HOST
              value: "mysql-service"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: saloon-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saloon-secrets
                  key: db-root-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: saloon-secrets
                  key: jwt-secret
            - name: KEYCLOAK_AUTH_URL
              value: "http://host.docker.internal:9090"
            - name: KEYCLOAK_PUBLIC_AUTH_URL
              value: "http://localhost:9090"
            - name: JWT_ISSUER_URI
              value: "http://host.docker.internal:9090/realms/saloon2"
            - name: API_GATEWAY_URL
              value: "/"
            - name: MANAGEMENT_HEALTH_MAIL_ENABLED
              value: "false"
            # Google Sign-In (fill in GOOGLE_CLIENT_ID from Google Cloud Console)
            - name: GOOGLE_SIGNIN_ENABLED
              value: "true"
            - name: GOOGLE_CLIENT_ID
              value: "300314982880-qfo1h0p1ck3spo2ls4gh3kpjmcctbqnv.apps.googleusercontent.com"
            - name: GOOGLE_REDIRECT_URI
              value: "http://localhost:3000/auth/google/callback"
            - name: GOOGLE_ALLOWED_REDIRECT_URIS
              value: "http://localhost:3000/auth/google/callback,http://api.saloon.local/auth/google/callback"
            - name: KEYCLOAK_GOOGLE_IDP_ALIAS
              value: "google"
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: "http://tempo.observability.svc.cluster.local:4318/v1/traces"
            - name: MANAGEMENT_TRACING_PROPAGATION_TYPE
              value: "w3c"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            timeoutSeconds: 5
            failureThreshold: 180
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
