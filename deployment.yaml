apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: janindu3/identity-service:latest  # Corrected image path
          imagePullPolicy: Always                 # Ensure the latest image is pulled
          ports:
            - containerPort: 8082
          env:
            - name: TZ
              value: "Asia/Colombo"               # Timezone set to Sri Lanka
          volumeMounts:
            - name: tz-config
              mountPath: /etc/localtime           # Mount /etc/localtime for timezone settings
              readOnly: true
            - name: tz-config
              mountPath: /etc/timezone            # Mount /etc/timezone
              readOnly: true
      volumes:
        - name: tz-config
          hostPath:
            path: /etc/localtime                  # Use host's /etc/localtime to set the timezone

---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  labels:
    app: identity-service
spec:
  type: NodePort                                # Expose the service on a NodePort
  selector:
    app: identity-service
  ports:
    - protocol: TCP
      port: 8082                                # Service port
      targetPort: 8082                          # Target container port
      nodePort: 30003                           # Specify NodePort to use (must be within the range 30000-32767)
