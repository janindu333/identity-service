# =============================================================================
# ENVIRONMENT VARIABLES TEMPLATE
# =============================================================================
# This file documents all configurable environment variables for the Identity Service
# Copy this file and rename it to .env for your specific environment
# =============================================================================

# =============================================================================
# APPLICATION CONFIGURATION
# =============================================================================
SERVER_PORT=8080
SERVER_CONTEXT_PATH=/
SPRING_PROFILES_ACTIVE=prod

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
DATABASE_URL=jdbc:mysql://mysql-service:3306/saloon-service?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
DATABASE_USERNAME=your_db_username
DATABASE_PASSWORD=your_db_password
DATABASE_MAX_POOL_SIZE=25
DATABASE_MIN_IDLE=10
DATABASE_CONNECTION_TIMEOUT=30000
DATABASE_IDLE_TIMEOUT=600000
DATABASE_MAX_LIFETIME=1800000
DATABASE_LEAK_DETECTION=60000

# JPA Configuration
JPA_DDL_AUTO=validate
JPA_SHOW_SQL=false
JPA_FORMAT_SQL=false
JPA_BATCH_SIZE=50

# =============================================================================
# SERVICE DISCOVERY
# =============================================================================
# Kubernetes: use Cluster DNS (CoreDNS) — no Eureka. Configure DB_HOST, REDIS_HOST, etc.

# =============================================================================
# JWT CONFIGURATION
# =============================================================================
JWT_SECRET=your_very_long_and_secure_jwt_secret_key_here
JWT_EXPIRATION=86400000
JWT_REFRESH_EXPIRATION=604800000

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
LOG_LEVEL_ROOT=WARN
LOG_LEVEL_APP=INFO
LOG_LEVEL_SQL=ERROR
LOG_LEVEL_SQL_BINDER=ERROR
LOG_LEVEL_SECURITY=WARN

# =============================================================================
# ACTUATOR CONFIGURATION
# =============================================================================
HEALTH_SHOW_DETAILS=when-authorized

# =============================================================================
# OPENAPI/SWAGGER CONFIGURATION
# =============================================================================
SWAGGER_ENABLED=false
SWAGGER_UI_ENABLED=false

# =============================================================================
# TRACING & MONITORING
# =============================================================================
SLEUTH_ENABLED=true
ZIPKIN_ENABLED=true
ZIPKIN_URL=http://zipkin:9411
TRACING_ENABLED=true
TRACING_SAMPLING_PROBABILITY=0.1

# =============================================================================
# PERFORMANCE & RESILIENCE
# =============================================================================
ASYNC_REQUEST_TIMEOUT=30000
TOMCAT_CONNECTION_TIMEOUT=20000
TOMCAT_MAX_THREADS=200
TOMCAT_ACCEPT_COUNT=100

# Circuit Breaker Configuration
CIRCUIT_BREAKER_WINDOW_SIZE=20
CIRCUIT_BREAKER_FAILURE_RATE=50
CIRCUIT_BREAKER_WAIT_DURATION=10000

# =============================================================================
# CACHE CONFIGURATION
# =============================================================================
CACHE_TYPE=redis
REDIS_HOST=redis-service
REDIS_PORT=6379
REDIS_PASSWORD=your_redis_password
REDIS_TIMEOUT=2000ms
REDIS_MAX_ACTIVE=20
REDIS_MAX_IDLE=10
REDIS_MIN_IDLE=5

# =============================================================================
# SECURITY CONFIGURATION
# =============================================================================
CORS_ALLOWED_ORIGINS=https://yourdomain.com
CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS
CORS_ALLOWED_HEADERS=Authorization,Content-Type,X-Requested-With
CORS_ALLOW_CREDENTIALS=true

# =============================================================================
# FEATURE FLAGS
# =============================================================================
AUDIT_LOGGING_ENABLED=true
RATE_LIMITING_ENABLED=true
CIRCUIT_BREAKER_ENABLED=true
K8S_HEALTH_CHECKS=true
METRICS_EXPORT_ENABLED=true
DISTRIBUTED_TRACING_ENABLED=true
SECURITY_HEADERS_ENABLED=true

# =============================================================================
# KUBERNETES SPECIFIC
# =============================================================================
K8S_DISCOVERY_ENABLED=false
K8S_CONFIG_ENABLED=false
K8S_SECRETS_ENABLED=false
K8S_NAMESPACE=default
K8S_ZONE=default
K8S_CLUSTER=default

# =============================================================================
# GRACEFUL SHUTDOWN
# =============================================================================
GRACEFUL_SHUTDOWN_TIMEOUT=30s

# =============================================================================
# DOCKER SPECIFIC
# =============================================================================
HOSTNAME=identity-service
DOCKER_HEALTH_CHECKS=true 