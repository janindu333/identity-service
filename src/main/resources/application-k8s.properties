spring.application.name=identity-service

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql-service}:${DB_PORT:3306}/${DB_NAME:saloon-service}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST:host.docker.internal}
spring.data.redis.port=${REDIS_PORT:6379}

server.port=8082

jwt.secret=${JWT_SECRET:U2dWa1lwMzczNjc5NzkyRjQyRjQ1Mjg0ODJCNGRiNjI1MTY1NTQ2ODU3NmQ1YTcxNDc0Nw==}
jwt.issuer-uri=${JWT_ISSUER_URI:}
# JWKS URL must be reachable from this pod (e.g. host.docker.internal). Token iss may still be http://localhost:... from Keycloak.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWKS_URI:http://host.docker.internal:9090/realms/saloon2/protocol/openid-connect/certs}
jwt.accepted-issuers=${JWT_ACCEPTED_ISSUERS:http://localhost:9090/realms/saloon2,http://host.docker.internal:9090/realms/saloon2}

# Keycloak integration for expanded Phase 1 (login/signup via Keycloak)
keycloak.auth-server-url=${KEYCLOAK_AUTH_URL:http://host.docker.internal:9090}
keycloak.realm=${KEYCLOAK_REALM:saloon2}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:api-gateway-test}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:2o28lzCd2DtQWuE5c4EUDuI9VEILzzV8}
keycloak.admin-client-id=${KEYCLOAK_ADMIN_CLIENT_ID:${keycloak.client-id}}
keycloak.admin-client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:${keycloak.client-secret}}
keycloak.remember-me-offline-access=${KEYCLOAK_REMEMBER_ME_OFFLINE:true}
saloon.service.url=${SALOON_SERVICE_URL:http://saloon-service:8083}

auth.google.enabled=${GOOGLE_SIGNIN_ENABLED:false}
auth.google.client-id=${GOOGLE_CLIENT_ID:}
auth.google.idp-alias=${KEYCLOAK_GOOGLE_IDP_ALIAS:google}
auth.google.default-redirect-uri=${GOOGLE_REDIRECT_URI:http://api.saloon.local/auth/google/callback}
auth.google.allowed-redirect-uris=${GOOGLE_ALLOWED_REDIRECT_URIS:http://api.saloon.local/auth/google/callback,http://localhost:3000/auth/google/callback}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# =============================================================================
# DISTRIBUTED TRACING (OpenTelemetry -> Tempo OTLP)
# =============================================================================
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://tempo.observability.svc.cluster.local:4318/v1/traces
management.tracing.propagation.type=w3c

# Keep Swagger "Try it out" on the gateway host (same as default "/"; override with API_PUBLIC_BASE_URL if needed)
api.gateway.url=${API_PUBLIC_BASE_URL:/}

