spring.application.name=identity-service

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql-service}:${DB_PORT:3306}/${DB_NAME:saloon-service}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST:host.docker.internal}
spring.data.redis.port=${REDIS_PORT:6379}

server.port=8082

jwt.secret=${JWT_SECRET:U2dWa1lwMzczNjc5NzkyRjQyRjQ1Mjg0ODJCNGRiNjI1MTY1NTQ2ODU3NmQ1YTcxNDc0Nw==}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =============================================================================
# DISTRIBUTED TRACING (OpenTelemetry -> Tempo OTLP)
# =============================================================================
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://tempo.observability.svc.cluster.local:4318/v1/traces
management.tracing.propagation.type=w3c

