eureka.url = http://eureka:password@localhost:8761/eureka

eureka.client.serviceUrl.defaultZone=${eureka.url}
spring.application.name=identity-service

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/saloon-service?createDatabaseIfNotExist=true 
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=debug

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/test-service/v3/api-docs

server.port=8082