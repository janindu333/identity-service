eureka.url = http://eureka:password@localhost:8761/eureka

eureka.client.serviceUrl.defaultZone=${eureka.url}
spring.application.name=identity-service

spring.main.web-application-type=servlet

# Allow bean definition overriding to resolve conflicts
spring.main.allow-bean-definition-overriding=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/saloon-service?createDatabaseIfNotExist=true 
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.baber.identityservice=DEBUG

# =============================================================================
# REDIS CONFIGURATION (for token blacklisting)
# =============================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

# Redis persistence configuration
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# OpenAPI documentation path
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Enable OpenAPI documentation
springdoc.api-docs.enabled=true
# Enable Swagger UI 
springdoc.swagger-ui.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

