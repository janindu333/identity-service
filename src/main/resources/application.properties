eureka.url = http://eureka:password@localhost:8761/eureka

eureka.client.serviceUrl.defaultZone=${eureka.url}
spring.application.name=identity-service

spring.main.web-application-type=servlet

# Allow bean definition overriding to resolve conflicts
spring.main.allow-bean-definition-overriding=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/saloon-service?createDatabaseIfNotExist=true 
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.baber.identityservice=DEBUG

# =============================================================================
# REDIS CONFIGURATION (for token blacklisting)
# =============================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

# Redis persistence configuration
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# =============================================================================
# RATE LIMITING
# =============================================================================
security.rate-limit.login.ip.limit=25
security.rate-limit.login.ip.window-seconds=60
security.rate-limit.login.username.limit=7
security.rate-limit.login.username.window-seconds=300
security.rate-limit.refresh.ip.limit=40
security.rate-limit.refresh.ip.window-seconds=60
security.rate-limit.refresh.username.limit=10
security.rate-limit.refresh.username.window-seconds=600

# OpenAPI documentation path
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Enable OpenAPI documentation
springdoc.api-docs.enabled=true
# Enable Swagger UI 
springdoc.swagger-ui.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

jwt.secret=U2dWa1lwMzczNjc5NzkyRjQyRjQ1Mjg0ODJCNGRiNjI1MTY1NTQ2ODU3NmQ1YTcxNDc0Nw==

server.port=0

# =============================================================================
# EMAIL CONFIGURATION (MailHog for testing)
# =============================================================================
# MailHog SMTP Configuration
# Default MailHog settings:
# - SMTP: localhost:1025 (no authentication)
# - Web UI: http://localhost:8085
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email service configuration
app.email.enabled=true
app.email.from=noreply@baberbooking.com
app.email.use-smtp=true

# Email verification configuration
app.email-verification.token-expiration-minutes=1440
app.email-verification.verify-url=http://localhost:3000/verify-email

# Password reset configuration
app.password-reset.token-expiration-minutes=60
app.password-reset.reset-url=http://localhost:3000/reset-password