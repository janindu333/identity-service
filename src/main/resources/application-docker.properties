# Eureka Configuration
eureka.url=http://eureka:password@discovery-server:8761/eureka
eureka.client.serviceUrl.defaultZone=${eureka.url}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=identity-service.default.svc.cluster.local
spring.application.name=identity-service

# Database Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/saloon-service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update

# Logging Configuration
logging.level.root=INFO
logging.level.com.baber.identityservice=INFO
logging.level.org.hibernate.SQL=debug

# Spring Cloud Gateway Configuration
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
ribbon.eureka.enabled=true

# Server Port
server.port=8082

# Disable Zipkin Tracing
spring.zipkin.enabled=false
spring.sleuth.enabled=false
management.tracing.enabled=false 
